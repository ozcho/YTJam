<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTJam - Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-header">
    <h2>YT<span>Jam</span> · Admin</h2>
    <div class="header-actions">
      <a class="btn-secondary" id="btn-open-player" href="#" target="_blank">📺 Reproductor</a>
      <span class="jam-code" id="jam-code"></span>
    </div>
  </header>

  <div class="share-bar" id="share-bar">
    <span>Enlace para invitados:</span>
    <code id="share-link"></code>
    <button class="btn-secondary" id="btn-copy-queue">Copiar Cola</button>
    <button class="btn-secondary" id="btn-copy-player">Copiar Reproductor</button>
    <button class="btn-secondary" id="btn-share">📤 Compartir</button>
    <label class="qr-toggle" title="Mostrar/ocultar QR en el reproductor">
      <span>QR</span>
      <input type="checkbox" id="chk-qr" checked>
      <span class="qr-toggle-slider"></span>
    </label>
  </div>

  <!-- Player controls -->
  <div class="admin-controls">
    <button class="btn-icon" id="btn-prev" title="Anterior">⏮</button>
    <button class="btn-icon btn-play" id="btn-play" title="Play/Pausa">▶</button>
    <button class="btn-icon" id="btn-next" title="Siguiente">⏭</button>
  </div>

  <div class="page-content">
    <!-- Add video -->
    <div class="section-title">Agregar video</div>
    <div class="tabs">
      <button class="tab active" data-tab="search" onclick="switchTab('search')">🔍 Buscar</button>
      <button class="tab" data-tab="url" onclick="switchTab('url')">🔗 Pegar URL</button>
    </div>

    <div id="tab-search" style="margin-top:12px">
      <div class="url-input-group">
        <input type="text" id="search-input" placeholder="Buscar videos en YouTube...">
        <button class="btn-primary" id="btn-search">Buscar</button>
      </div>
      <ul class="search-results" id="search-results"></ul>
    </div>

    <div id="tab-url" style="margin-top:12px;display:none">
      <div class="url-input-group">
        <input type="text" id="url-input" placeholder="Pega un link de YouTube...">
        <button class="btn-primary" id="btn-add-url">Agregar</button>
      </div>
    </div>

    <!-- Queue management -->
    <div class="section-title">Cola de reproducción</div>
    <ul class="queue-list" id="queue-list">
      <li class="empty-state">
        <div class="icon">🎶</div>
        <p>La cola está vacía. ¡Agrega un video!</p>
      </li>
    </ul>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const jamId = window.location.pathname.split('/')[2];
    let adminToken = localStorage.getItem(`ytjam_admin_${jamId}`);
    const socket = io();
    let currentState = null;
    let isPlaying = false;

    if (!adminToken) {
      showPasswordPrompt();
    } else {
      initAdmin();
    }

    function showPasswordPrompt() {
      document.body.innerHTML = `
        <div class="home-container">
          <h1>🔒 YT<span style="color:var(--accent)">Jam</span> Admin</h1>
          <p class="subtitle">Introduce la contraseña de administrador</p>
          <div class="create-group">
            <input type="password" id="admin-pass" placeholder="Contraseña" maxlength="50" autofocus>
            <button class="btn-primary" id="btn-auth">Entrar</button>
          </div>
          <p id="auth-error" style="color:#e74c3c;margin-top:8px;display:none"></p>
          <a href="/jam/${jamId}" style="color:var(--text-muted);margin-top:12px;display:inline-block">Volver a la cola</a>
        </div>`;
      document.getElementById('btn-auth').addEventListener('click', doAuth);
      document.getElementById('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
    }

    async function doAuth() {
      const pass = document.getElementById('admin-pass').value;
      if (!pass) return;
      const res = await fetch('/api/jams/' + jamId + '/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      });
      if (!res.ok) {
        document.getElementById('auth-error').textContent = 'Contraseña incorrecta';
        document.getElementById('auth-error').style.display = 'block';
        return;
      }
      const data = await res.json();
      adminToken = data.adminToken;
      localStorage.setItem(`ytjam_admin_${jamId}`, adminToken);
      window.location.reload();
    }

    function initAdmin() {

    document.getElementById('jam-code').textContent = jamId;
    document.getElementById('btn-open-player').href = '/jam/' + jamId + '/player';

    let baseUrl = window.location.origin;
    fetch('/api/config').then(r => r.json()).then(cfg => {
      if (cfg.baseUrl) baseUrl = cfg.baseUrl;
      document.getElementById('share-link').textContent = `${baseUrl}/jam/${jamId}`;
    });

    document.getElementById('btn-copy-queue').addEventListener('click', () => {
      navigator.clipboard.writeText(`${baseUrl}/jam/${jamId}`);
      showToast('Enlace de cola copiado');
    });

    document.getElementById('btn-copy-player').addEventListener('click', () => {
      navigator.clipboard.writeText(`${baseUrl}/jam/${jamId}/player`);
      showToast('Enlace de reproductor copiado');
    });

    document.getElementById('btn-share').addEventListener('click', () => {
      const url = `${baseUrl}/jam/${jamId}`;
      if (navigator.share) {
        navigator.share({ url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url);
        showToast('Enlace copiado');
      }
    });

    document.getElementById('chk-qr').addEventListener('change', (e) => {
      socket.emit('toggle-qr', { show: e.target.checked });
    });

    // Connect
    socket.emit('join-jam', { jamId, role: 'admin', adminToken });

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('tab-search').style.display = tab === 'search' ? '' : 'none';
      document.getElementById('tab-url').style.display = tab === 'url' ? '' : 'none';
    }

    // Search
    let searchTimeout = null;
    document.getElementById('btn-search').addEventListener('click', doSearch);
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });
    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(doSearch, 500);
    });

    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      const container = document.getElementById('search-results');
      container.innerHTML = '<li class="empty-state"><p>Buscando...</p></li>';
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const results = await res.json();
        if (results.length === 0) {
          container.innerHTML = '<li class="empty-state"><p>Sin resultados</p></li>';
          return;
        }
        container.innerHTML = results.map(v => `
          <li class="search-result-item" onclick="addFromSearch('${v.videoId}', this)">
            <img src="${escapeAttr(v.thumbnail)}" alt="">
            <div class="queue-item-info">
              <div class="title">${escapeHtml(v.title)}</div>
              <div class="added-by">${escapeHtml(v.channel)} · ${escapeHtml(v.duration)}</div>
            </div>
            <button class="btn-icon" title="Agregar" style="font-size:20px;flex-shrink:0">+</button>
          </li>
        `).join('');
      } catch(e) {
        container.innerHTML = '<li class="empty-state"><p>Error al buscar</p></li>';
      }
    }

    function addFromSearch(videoId, el) {
      if (el) {
        const title = el.querySelector('.title').textContent;
        const thumbnail = el.querySelector('img').src;
        socket.emit('add-video', { videoId, title, thumbnail, addedBy: 'Admin' });
        showToast('¡Video agregado!');
        return;
      }
      addVideoById(videoId);
    }

    // Player controls
    document.getElementById('btn-play').addEventListener('click', () => {
      if (isPlaying) {
        socket.emit('pause');
      } else {
        socket.emit('play');
      }
    });

    document.getElementById('btn-prev').addEventListener('click', () => socket.emit('prev'));
    document.getElementById('btn-next').addEventListener('click', () => socket.emit('next'));

    // Add video by URL
    document.getElementById('btn-add-url').addEventListener('click', () => {
      const url = document.getElementById('url-input').value.trim();
      const videoId = extractVideoId(url);
      if (!videoId) {
        showToast('URL no válida');
        return;
      }
      addVideoById(videoId);
      document.getElementById('url-input').value = '';
    });

    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-add-url').click();
    });

    function extractVideoId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
        /^([a-zA-Z0-9_-]{11})$/,
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    function addVideoById(videoId) {
      fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
        .then(r => r.json())
        .then(data => {
          socket.emit('add-video', {
            videoId,
            title: data.title || 'Video sin título',
            thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
            addedBy: 'Admin',
          });
          showToast('¡Video agregado!');
        })
        .catch(() => {
          socket.emit('add-video', {
            videoId,
            title: 'Video de YouTube',
            thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
            addedBy: 'Admin',
          });
          showToast('Video agregado');
        });
    }

    // State updates
    socket.on('jam-state', (state) => {
      currentState = state;
      isPlaying = state.isPlaying;
      document.getElementById('btn-play').textContent = isPlaying ? '⏸' : '▶';
      document.getElementById('chk-qr').checked = state.showQr !== false;
      renderQueue(state);
    });

    socket.on('error-msg', (msg) => {
      showToast(msg);
    });

    function renderQueue(state) {
      const list = document.getElementById('queue-list');

      if (state.queue.length === 0) {
        list.innerHTML = `
          <li class="empty-state">
            <div class="icon">🎶</div>
            <p>La cola está vacía. ¡Agrega un video!</p>
          </li>`;
        return;
      }

      list.innerHTML = state.queue.map((item, i) => `
        <li class="queue-item ${i === state.currentIndex ? 'playing' : ''}" data-index="${i}">
          <span class="queue-item-index">${i === state.currentIndex ? '▶' : i + 1}</span>
          <img src="${escapeAttr(item.thumbnail)}" alt="">
          <div class="queue-item-info">
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="added-by">${escapeHtml(item.addedBy)} · ${statusBadge(item.status)}</div>
          </div>
          <div class="queue-item-actions">
            <button class="btn-icon" onclick="moveUp(${i})" title="Subir" ${i === 0 ? 'disabled' : ''}>↑</button>
            <button class="btn-icon" onclick="moveDown(${i})" title="Bajar" ${i === state.queue.length - 1 ? 'disabled' : ''}>↓</button>
            <button class="btn-icon" onclick="playAt(${i})" title="Reproducir" ${item.status !== 'ready' ? 'disabled' : ''}>▶</button>
            <button class="btn-icon" onclick="removeAt(${i})" title="Eliminar" style="color:var(--accent)">✕</button>
          </div>
        </li>
      `).join('');
    }

    function statusBadge(status) {
      if (status === 'ready') return '<span style="color:var(--green)">✓ Listo</span>';
      if (status === 'downloading') return '<span style="color:#f39c12">⏳ Descargando...</span>';
      if (status === 'error') return '<span style="color:var(--accent)">✕ Error</span>';
      return '';
    }

    function moveUp(index) {
      if (index > 0) {
        socket.emit('move-video', { fromIndex: index, toIndex: index - 1 });
      }
    }

    function moveDown(index) {
      if (currentState && index < currentState.queue.length - 1) {
        socket.emit('move-video', { fromIndex: index, toIndex: index + 1 });
      }
    }

    function playAt(index) {
      socket.emit('play-index', index);
    }

    function removeAt(index) {
      socket.emit('remove-video', index);
    }

    window.moveUp = moveUp;
    window.moveDown = moveDown;
    window.playAt = playAt;
    window.removeAt = removeAt;
    window.addFromSearch = addFromSearch;
    window.switchTab = switchTab;

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    } // end initAdmin
  </script>
</body>
</html>
