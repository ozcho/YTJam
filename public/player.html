<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTJam - Reproductor</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="player-page">
    <div class="player-wrapper">
      <video id="video-player" autoplay muted playsinline style="width:100%;height:100%;background:#000;object-fit:contain"></video>
      <div id="start-screen" onclick="startPlayer()" style="position:absolute;top:0;left:0;right:0;bottom:0;background:#0f0f0f;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;cursor:pointer;z-index:10">
        <div style="font-size:72px;margin-bottom:20px">🎵</div>
        <div style="font-size:24px;font-weight:600;margin-bottom:8px">YTJam</div>
        <div style="color:#888;font-size:16px">Toca para iniciar el reproductor</div>
      </div>
      <div id="waiting-screen" style="position:absolute;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;flex-direction:column;color:#888;font-size:18px">
        <div style="font-size:48px;margin-bottom:12px">⏳</div>
        <div id="waiting-msg">Esperando video...</div>
      </div>
    </div>
    <div class="player-bar">
      <div id="qr-code" class="player-bar-qr"></div>
      <div class="now-playing" id="now-playing">
        Esperando cola...
        <br><span>Comparte el código para que agreguen videos</span>
      </div>
      <div class="next-up" id="next-up"></div>
      <button class="btn-fullscreen" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
      <span class="jam-code" id="jam-code"></span>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const jamId = window.location.pathname.split('/')[2];
    const socket = io();
    let currentState = null;
    const videoEl = document.getElementById('video-player');
    const waitingScreen = document.getElementById('waiting-screen');
    const waitingMsg = document.getElementById('waiting-msg');
    const startScreen = document.getElementById('start-screen');
    let started = false;

    function startPlayer() {
      started = true;
      startScreen.style.display = 'none';
      // Unlock audio on iOS: play muted first, then unmute
      videoEl.muted = true;
      videoEl.play().then(function() {
        videoEl.muted = false;
      }).catch(function() {
        videoEl.muted = false;
      });
      // Now connect and load
      socket.emit('join-jam', { jamId: jamId, role: 'player' });
    }
    window.startPlayer = startPlayer;

    document.getElementById('jam-code').textContent = jamId;

    // Generate QR code for queue URL
    fetch('/api/config').then(r => r.json()).then(cfg => {
      const base = cfg.baseUrl || window.location.origin;
      const queueUrl = base + '/jam/' + jamId;
      new QRCode(document.getElementById('qr-code'), {
        text: queueUrl,
        width: 80,
        height: 80,
        colorDark: '#ffffff',
        colorLight: '#1a1a2e',
        correctLevel: QRCode.CorrectLevel.L
      });
    });

    videoEl.addEventListener('ended', () => {
      socket.emit('video-ended');
    });

    videoEl.addEventListener('play', () => {
      socket.emit('player-status', { isPlaying: true });
    });

    videoEl.addEventListener('pause', () => {
      socket.emit('player-status', { isPlaying: false });
    });

    socket.on('jam-state', (state) => {
      currentState = state;
      updateNowPlaying(state);
      tryLoadCurrent(state);
      const qrEl = document.getElementById('qr-code');
      qrEl.style.display = state.showQr !== false ? '' : 'none';
    });

    socket.on('player-command', (cmd) => {
      switch (cmd.action) {
        case 'play':
          videoEl.muted = true;
          videoEl.play().then(function() { videoEl.muted = false; }).catch(function(){});
          break;
        case 'pause':
          videoEl.pause();
          break;
        case 'load':
          if (currentState) tryLoadCurrent(currentState);
          break;
        case 'seek':
          videoEl.currentTime = cmd.time;
          break;
      }
    });

    function tryLoadCurrent(state) {
      if (!started) return;
      if (state.queue.length === 0) {
        videoEl.removeAttribute('src');
        videoEl.style.display = 'none';
        waitingScreen.style.display = 'flex';
        waitingMsg.textContent = 'Esperando videos...';
        return;
      }

      const current = state.queue[state.currentIndex];
      if (!current) return;

      if (current.status === 'ready' && current.mediaUrl) {
        if (videoEl.getAttribute('data-video-id') !== current.videoId) {
          videoEl.setAttribute('data-video-id', current.videoId);
          videoEl.muted = true;
          videoEl.src = current.mediaUrl;
          videoEl.load();
          videoEl.play().then(function() {
            videoEl.muted = false;
          }).catch(function(){});
        }
        videoEl.style.display = 'block';
        waitingScreen.style.display = 'none';
      } else if (current.status === 'downloading') {
        videoEl.style.display = 'none';
        waitingScreen.style.display = 'flex';
        waitingMsg.textContent = 'Descargando: ' + current.title + '...';
      } else if (current.status === 'error') {
        videoEl.style.display = 'none';
        waitingScreen.style.display = 'flex';
        waitingMsg.textContent = 'Error al descargar este video';
      }
    }

    function updateNowPlaying(state) {
      const el = document.getElementById('now-playing');
      if (state.queue.length === 0) {
        el.innerHTML = 'Esperando cola...<br><span>Escanea el QR para agregar videos</span>';
        document.getElementById('next-up').style.display = 'none';
        return;
      }
      const current = state.queue[state.currentIndex];
      if (current) {
        const statusIcon = current.status === 'ready' ? '\u25b6' : current.status === 'downloading' ? '\u23f3' : '\u274c';
        el.innerHTML = statusIcon + ' ' + escapeHtml(current.title) + '<br><span>Agregado por ' + escapeHtml(current.addedBy) + ' \u00b7 ' + (state.currentIndex + 1) + '/' + state.queue.length + '</span>';
      }

      // Update next-up
      const nextEl = document.getElementById('next-up');
      const nextIndex = state.currentIndex + 1;
      if (nextIndex < state.queue.length) {
        const next = state.queue[nextIndex];
        nextEl.innerHTML = '\u23ed\ufe0f Siguiente: <strong>' + escapeHtml(next.title) + '</strong>';
        nextEl.style.display = 'block';
      } else {
        nextEl.style.display = 'none';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    // Fullscreen
    function toggleFullscreen() {
      const page = document.querySelector('.player-page');
      // iOS Safari only supports fullscreen on the video element itself
      if (videoEl.webkitEnterFullscreen && !document.fullscreenElement && !document.webkitFullscreenElement) {
        videoEl.webkitEnterFullscreen();
        return;
      }
      const reqFS = page.requestFullscreen || page.webkitRequestFullscreen;
      const exitFS = document.exitFullscreen || document.webkitExitFullscreen;
      const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
      if (!fsEl) {
        reqFS.call(page).catch(function(){});
      } else {
        exitFS.call(document);
      }
    }
    window.toggleFullscreen = toggleFullscreen;
  </script>
</body>
</html>
